<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleep Health AI Assessor</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            min-height: 100vh;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.1);
        }

        .input-elegant {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(200, 210, 220, 0.5);
            transition: all 0.3s ease;
        }

        .input-elegant:focus {
            border-color: #4F46E5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
            outline: none;
            transform: translateY(-1px);
        }

        .btn-modern {
            background: linear-gradient(135deg, #4F46E5 0%, #6366F1 100%);
            box-shadow: 0 4px 14px 0 rgba(79, 70, 229, 0.39);
            transition: all 0.3s ease;
        }

        .btn-modern:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 rgba(79, 70, 229, 0.39);
        }

        .btn-modern:active {
            transform: translateY(0);
        }
        
        #result-container {
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            opacity: 0;
            transform: translateY(20px);
            display: none;
        }
        
        #result-container.show {
            opacity: 1;
            transform: translateY(0);
            display: block;
        }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4F46E5;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: none;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="py-12 px-4 sm:px-6 lg:px-8 flex items-center justify-center">

    <div class="max-w-4xl w-full space-y-8 glass-panel rounded-3xl p-10">
        <div class="text-center">
            <h1 class="text-5xl font-bold text-gray-900 mb-2">Sleep Health AI Assessor</h1>
            <p class="text-lg text-gray-600">Enter your lifestyle metrics below to get an AI-powered sleep disorder prediction.</p>
        </div>

        <form id="prediction-form" class="mt-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Age -->
                <div class="flex flex-col">
                    <label for="Age" class="text-sm font-medium text-gray-700 mb-1">Age (Years)</label>
                    <input type="number" id="Age" name="Age" required min="18" max="100" class="input-elegant rounded-xl px-4 py-3 text-gray-800" placeholder="e.g. 35">
                </div>
                
                <!-- Gender -->
                <div class="flex flex-col">
                    <label for="Gender" class="text-sm font-medium text-gray-700 mb-1">Gender</label>
                    <select id="Gender" name="Gender" required class="input-elegant rounded-xl px-4 py-3 text-gray-800">
                        <option value="" disabled selected>Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>

                <!-- Occupation -->
                <div class="flex flex-col">
                    <label for="Occupation" class="text-sm font-medium text-gray-700 mb-1">Occupation</label>
                    <select id="Occupation" name="Occupation" required class="input-elegant rounded-xl px-4 py-3 text-gray-800">
                        <option value="" disabled selected>Select Occupation</option>
                        <option value="Accountant">Accountant</option>
                        <option value="Doctor">Doctor</option>
                        <option value="Engineer">Engineer</option>
                        <option value="Lawyer">Lawyer</option>
                        <option value="Manager">Manager</option>
                        <option value="Nurse">Nurse</option>
                        <option value="Sales Representative">Sales Representative</option>
                        <option value="Salesperson">Salesperson</option>
                        <option value="Scientist">Scientist</option>
                        <option value="Software Engineer">Software Engineer</option>
                        <option value="Teacher">Teacher</option>
                    </select>
                </div>

                <!-- Sleep Duration -->
                <div class="flex flex-col">
                    <label for="Sleep Duration" class="text-sm font-medium text-gray-700 mb-1">Sleep Duration (Hours)</label>
                    <input type="number" id="Sleep Duration" name="Sleep Duration" step="0.1" required class="input-elegant rounded-xl px-4 py-3 text-gray-800" placeholder="e.g. 7.5">
                </div>

                <!-- Quality of Sleep -->
                <div class="flex flex-col">
                    <label for="Quality of Sleep" class="text-sm font-medium text-gray-700 mb-1">Quality of Sleep (1-10)</label>
                    <input type="number" id="Quality of Sleep" name="Quality of Sleep" min="1" max="10" required class="input-elegant rounded-xl px-4 py-3 text-gray-800" placeholder="e.g. 8">
                </div>

                <!-- Physical Activity Level -->
                <div class="flex flex-col">
                    <label for="Physical Activity Level" class="text-sm font-medium text-gray-700 mb-1">Physical Activity (mins/day)</label>
                    <input type="number" id="Physical Activity Level" name="Physical Activity Level" required class="input-elegant rounded-xl px-4 py-3 text-gray-800" placeholder="e.g. 60">
                </div>

                <!-- Stress Level -->
                <div class="flex flex-col">
                    <label for="Stress Level" class="text-sm font-medium text-gray-700 mb-1">Stress Level (1-10)</label>
                    <input type="number" id="Stress Level" name="Stress Level" min="1" max="10" required class="input-elegant rounded-xl px-4 py-3 text-gray-800" placeholder="e.g. 5">
                </div>

                <!-- BMI Category -->
                <div class="flex flex-col">
                    <label for="BMI Category" class="text-sm font-medium text-gray-700 mb-1">BMI Category</label>
                    <select id="BMI Category" name="BMI Category" required class="input-elegant rounded-xl px-4 py-3 text-gray-800">
                        <option value="" disabled selected>Select Category</option>
                        <option value="Normal Weight">Normal Weight</option>
                        <option value="Normal">Normal</option>
                        <option value="Overweight">Overweight</option>
                        <option value="Obese">Obese</option>
                    </select>
                </div>

                <!-- Blood Pressure -->
                <div class="flex flex-col">
                    <label for="Blood Pressure" class="text-sm font-medium text-gray-700 mb-1">Blood Pressure</label>
                    <input type="text" id="Blood Pressure" name="Blood Pressure" required pattern="\d{2,3}\/\d{2,3}" class="input-elegant rounded-xl px-4 py-3 text-gray-800" placeholder="e.g. 120/80">
                </div>

                <!-- Heart Rate -->
                <div class="flex flex-col">
                    <label for="Heart Rate" class="text-sm font-medium text-gray-700 mb-1">Heart Rate (bpm)</label>
                    <input type="number" id="Heart Rate" name="Heart Rate" required class="input-elegant rounded-xl px-4 py-3 text-gray-800" placeholder="e.g. 70">
                </div>

                <!-- Daily Steps -->
                <div class="flex flex-col">
                    <label for="Daily Steps" class="text-sm font-medium text-gray-700 mb-1">Daily Steps</label>
                    <input type="number" id="Daily Steps" name="Daily Steps" required class="input-elegant rounded-xl px-4 py-3 text-gray-800" placeholder="e.g. 8000">
                </div>
            </div>

            <div class="mt-10 flex justify-center">
                <button type="submit" id="submit-btn" class="btn-modern text-white rounded-xl px-8 py-4 font-bold text-lg flex items-center justify-center w-full md:w-auto min-w-[200px]">
                    <span id="btn-text">Analyze Sleep Health</span>
                    <div id="loader" class="loader ml-3"></div>
                </button>
            </div>
        </form>

        <div id="result-container" class="mt-8 rounded-2xl p-8 text-center bg-white border border-gray-100">
            <h2 class="text-xl font-semibold text-gray-500 mb-2">Prediction Result</h2>
            <div id="result-pill" class="inline-block px-8 py-4 rounded-full text-3xl font-bold mt-2 shadow-sm">
                <!-- Result goes here -->
            </div>
            <p id="result-desc" class="mt-4 text-gray-600 font-medium"></p>
        </div>
    </div>

    <script>
        document.getElementById('prediction-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btnText = document.getElementById('btn-text');
            const loader = document.getElementById('loader');
            const resultContainer = document.getElementById('result-container');
            const resultPill = document.getElementById('result-pill');
            const resultDesc = document.getElementById('result-desc');
            
            // UI State loading
            btnText.textContent = 'Analyzing...';
            loader.style.display = 'block';
            resultContainer.classList.remove('show');
            setTimeout(() => resultContainer.style.display = 'none', 300);

            // Fetch form data
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const resData = await response.json();
                
                if (resData.status === 'success') {
                    const prediction = resData.prediction; // 'None', 'Sleep Apnea', 'Insomnia'
                    resultPill.textContent = prediction === 'None' ? 'No Disorder Detected' : prediction;
                    
                    // Style pill based on result
                    if (prediction === 'None') {
                        resultPill.className = 'inline-block px-8 py-4 rounded-full text-3xl font-bold mt-2 shadow-md bg-green-100 text-green-700 border border-green-200';
                        resultDesc.textContent = "Your lifestyle metrics indicate a healthy sleep pattern!";
                    } else if (prediction === 'Insomnia') {
                        resultPill.className = 'inline-block px-8 py-4 rounded-full text-3xl font-bold mt-2 shadow-md bg-yellow-100 text-yellow-700 border border-yellow-200';
                        resultDesc.textContent = "Your metrics suggest signs of Insomnia. Consider optimizing your bedtime routine.";
                    } else if (prediction === 'Sleep Apnea') {
                        resultPill.className = 'inline-block px-8 py-4 rounded-full text-3xl font-bold mt-2 shadow-md bg-red-100 text-red-700 border border-red-200';
                        resultDesc.textContent = "Your metrics point towards Sleep Apnea. It may be beneficial to consult a professional.";
                    }
                    
                    // Show result
                    setTimeout(() => {
                        resultContainer.style.display = 'block';
                        // Trigger reflow
                        void resultContainer.offsetWidth;
                        resultContainer.classList.add('show');
                    }, 500);
                } else {
                    alert('Error: ' + resData.error);
                }
            } catch (error) {
                alert('Connection to server failed.');
                console.error(error);
            } finally {
                // Restore button
                btnText.textContent = 'Analyze Sleep Health';
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
